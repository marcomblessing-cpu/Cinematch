<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0C0C0F">
<title>CinemaMatch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available;background:#0C0C0F;overflow:hidden}
body{height:100%;height:-webkit-fill-available;background:#0C0C0F;overflow:hidden;-webkit-font-smoothing:antialiased;font-family:'DM Sans',sans-serif;color:#F2EEE4;-webkit-text-size-adjust:100%}
button,input{font-family:inherit;-webkit-appearance:none;appearance:none}
input{-webkit-user-select:auto;user-select:auto;font-size:16px!important}/* 16px verhindert iOS-Zoom */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#2A2A32;border-radius:2px}

/* ── Layout ── */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;user-select:none;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes matchPop{0%{opacity:0;transform:scale(.5)}65%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.16)}}
.fade-up{animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both}
.fade-in{animation:fadeIn .25s ease both}
.serif{font-family:'Cormorant Garamond',serif}
.spinner{width:28px;height:28px;border:1.5px solid #2A2A32;border-top-color:#C9A84C;border-radius:50%;animation:spin .9s linear infinite;display:inline-block}

/* ── Interactivity ── */
.press{transition:transform .12s ease,opacity .12s ease;cursor:pointer;touch-action:manipulation}
.press:active{transform:scale(.9)!important;opacity:.65}
.pl{cursor:pointer;touch-action:manipulation}
.pl:active{opacity:.5}
input:focus{outline:2px solid rgba(201,168,76,.4);outline-offset:0}
input::placeholder{color:#4A4A50}

/* ── Screens ── */
.screen{width:100%;max-width:430px;padding:0 20px}

/* ── Card area ── */
#swipe-wrap{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;flex-shrink:0}
#card-stage{flex:1;position:relative;overflow:hidden;padding:4px 12px 0}

/* ── Cards ── */
.card{
  position:absolute;inset:10px;border-radius:22px;overflow:hidden;
  background:#18181D;touch-action:none;
  will-change:transform;-webkit-backface-visibility:hidden;backface-visibility:hidden;
}
.card-main{
  cursor:grab;
  box-shadow:0 16px 50px rgba(0,0,0,.65);
  transition:none;
}
.card-main.snap-back{transition:transform .22s ease}
.card-main.flying{transition:transform .34s cubic-bezier(.22,1,.36,1),opacity .34s ease}
.card-bg{transform:scale(.93) translateY(11px);opacity:.36;pointer-events:none}

/* ── Card image ── */
.card-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;display:block;
}
/* card-placeholder nicht mehr verwendet — Spinner stattdessen */
.card-gradient{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(to top,rgba(5,5,9,.97) 0%,rgba(5,5,9,.5) 42%,transparent 68%);
}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:14px 16px 18px;pointer-events:none}

/* ── Stamps ── */
.stamp{
  position:absolute;top:22px;border:2.5px solid;border-radius:9px;
  padding:5px 14px;font-size:18px;font-weight:700;
  opacity:0;transition:opacity .05s;letter-spacing:1.5px;pointer-events:none;
}
#like-stamp{left:18px;color:#4ADE80;border-color:#4ADE80;background:rgba(74,222,128,.14);transform:rotate(-13deg)}
#nope-stamp{right:18px;color:#F87171;border-color:#F87171;background:rgba(248,113,113,.14);transform:rotate(13deg)}

/* ── Badges ── */
.pbadge{font-size:10px;font-weight:600;color:#fff;border-radius:5px;padding:3px 8px;display:inline-block;line-height:1.4}
.gtag{font-size:11px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:2px 9px;display:inline-block;line-height:1.5}
.prow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.grow{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}

/* ── Bottom buttons ── */
#swipe-btns{display:flex;justify-content:center;align-items:center;gap:22px;padding:10px 20px;padding-bottom:calc(16px + env(safe-area-inset-bottom));flex-shrink:0}
.nope-btn{
  width:64px;height:64px;border-radius:50%;
  background:#F87171;border:2px solid #ef4444;
  font-size:22px;font-weight:700;color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;touch-action:manipulation;
  box-shadow:0 4px 20px rgba(248,113,113,.4);
}
.like-btn{
  width:64px;height:64px;border-radius:50%;
  background:rgba(74,222,128,.14);border:2px solid rgba(74,222,128,.65);
  font-size:26px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;touch-action:manipulation;
  box-shadow:0 4px 20px rgba(74,222,128,.18);
}
.pause-btn{background:transparent;border:1px solid #2A2A32;border-radius:10px;padding:9px 16px;font-size:11px;font-weight:300;color:#4A4A50;cursor:pointer;touch-action:manipulation}

/* ── UI Buttons ── */
.gold-btn{background:linear-gradient(135deg,#C9A84C,#A88A38);color:#0C0C0F;border:none;border-radius:13px;padding:13px 20px;font-size:15px;font-weight:500;cursor:pointer;width:100%;touch-action:manipulation}
.topbar-btn{background:#111115;border:1px solid #2A2A32;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:300;color:#8A8780;cursor:pointer;touch-action:manipulation;white-space:nowrap}
.topbar-btn.gold{background:rgba(201,168,76,.10);border-color:rgba(201,168,76,.22);color:#C9A84C;font-weight:500}
.tab-btn{flex:1;background:transparent;border:1px solid transparent;border-radius:10px;padding:9px 0;font-size:12px;font-weight:400;color:#8A8780;cursor:pointer;transition:all .18s;touch-action:manipulation}
.tab-btn.active{background:#222228;border-color:#38383F;color:#F2EEE4;font-weight:600}
.player-btn{display:flex;align-items:center;gap:14px;background:#111115;border:1px solid #2A2A32;border-radius:16px;padding:14px 16px;cursor:pointer;text-align:left;width:100%;touch-action:manipulation}
.match-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(201,168,76,.10);border:1px solid rgba(201,168,76,.22);border-radius:20px;padding:7px 13px;font-size:12px;font-weight:500;color:#C9A84C;cursor:pointer;white-space:nowrap;touch-action:manipulation}
.small-btn{background:linear-gradient(135deg,#C9A84C,#A88A38);color:#0C0C0F;border:none;border-radius:10px;padding:9px 22px;font-size:13px;font-weight:500;cursor:pointer;touch-action:manipulation}

/* ── Match overlay ── */
#match-overlay{position:fixed;inset:0;background:rgba(10,10,13,.94);-webkit-backdrop-filter:blur(22px);backdrop-filter:blur(22px);display:none;align-items:center;justify-content:center;z-index:1000;padding:28px;padding-bottom:calc(28px + env(safe-area-inset-bottom))}
#match-overlay.show{display:flex;animation:fadeIn .3s ease both}

/* ── Matches list ── */
.matches-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.match-card{background:#111115;border-radius:14px;overflow:hidden;border:1px solid #2A2A32}
.match-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}

/* ── Misc ── */
.card-box{background:#111115;border:1px solid #2A2A32;border-radius:16px;padding:22px;margin-bottom:14px}
.label-sm{font-size:10px;letter-spacing:1.5px;color:#4A4A50;text-transform:uppercase;font-weight:500;margin-bottom:7px}
.inp{width:100%;background:#222228;border:1px solid #1E1E24;border-radius:10px;padding:12px 14px;color:#F2EEE4;font-size:16px;font-weight:300}
</style>
</head>

const S = {
  screen:"loading", names:{p1:"Spieler 1",p2:"Spieler 2"},
  nameEdit:{p1:"",p2:""}, player:"p1", queue:[],
  p1Liked:[], p2Liked:[], p1Seen:new Set(), p2Seen:new Set(),
  matches:[], newMatch:null, media:"movie",
  drag:{on:false,x:0}, animating:false, extraTitles:[],
};

function save() {
  try {
    localStorage.setItem("cm_names",   JSON.stringify(S.names));
    localStorage.setItem("cm_p1l",     JSON.stringify(S.p1Liked));
    localStorage.setItem("cm_p2l",     JSON.stringify(S.p2Liked));
    localStorage.setItem("cm_p1s",     JSON.stringify([...S.p1Seen]));
    localStorage.setItem("cm_p2s",     JSON.stringify([...S.p2Seen]));
    localStorage.setItem("cm_matches", JSON.stringify(S.matches));
  } catch(e) {}
}

function load() {
  try {
    const ns  = localStorage.getItem("cm_names");
    const p1l = localStorage.getItem("cm_p1l");
    const p2l = localStorage.getItem("cm_p2l");
    const p1s = localStorage.getItem("cm_p1s");
    const p2s = localStorage.getItem("cm_p2s");
    const ms  = localStorage.getItem("cm_matches");
    if (ns)  { const n=JSON.parse(ns); S.names=n; S.nameEdit={...n}; }
    if (p1l) S.p1Liked = JSON.parse(p1l);
    if (p2l) S.p2Liked = JSON.parse(p2l);
    if (p1s) S.p1Seen  = new Set(JSON.parse(p1s));
    if (p2s) S.p2Seen  = new Set(JSON.parse(p2s));
    if (ms)  S.matches  = JSON.parse(ms);
    S.screen = ns ? "select" : "names";
  } catch(e) { S.screen = "names"; }
}

// ══════════════════════════════════════════════════════════
// QUEUE
// ══════════════════════════════════════════════════════════
function buildQueue() {
  const seen = S.player==="p1" ? S.p1Seen : S.p2Seen;
  const all  = [...TITLES, ...S.extraTitles];
  let pool;
  if (S.media==="both") {
    const mv = all.filter(m=>m.tp==="movie"&&!seen.has(String(m.id)));
    const tv = all.filter(m=>m.tp==="tv"&&!seen.has(String(m.id)));
    pool=[];
    for(let i=0;i<Math.max(mv.length,tv.length);i++){
      if(mv[i])pool.push(mv[i]);
      if(tv[i])pool.push(tv[i]);
    }
  } else {
    pool = all.filter(m=>m.tp===S.media&&!seen.has(String(m.id)));
  }
  if (!pool.length) {
    // Reset seen and restart
    if(S.player==="p1")S.p1Seen=new Set();else S.p2Seen=new Set();
    return buildQueue();
  }
  S.queue = pool;
  // Sofort die ersten 10 Bilder vorausladen
  preloadImages(pool.slice(0,10));
}

// ══════════════════════════════════════════════════════════
// BILD-SYSTEM — Promise-basiert, wartet auf echtes Laden
// ══════════════════════════════════════════════════════════
// Map: posterPath → Promise<HTMLImageElement|null>
const imgCache = new Map();

// Lädt ein Bild und speichert das Promise — mehrfache Aufrufe
// warten alle auf dasselbe Promise (kein Doppelt-Laden)
function loadImg(path) {
  if (!path) return Promise.resolve(null);
  const url = IMG + path;
  if (imgCache.has(path)) return imgCache.get(path);
  const p = new Promise(resolve => {
    const img = new Image();
    img.onload  = () => resolve(img);
    img.onerror = () => resolve(null);   // Fehler → null, kein Crash
    img.src = url;
  });
  imgCache.set(path, p);
  return p;
}

// Lädt die nächsten N Bilder im Hintergrund vor
function preloadImages(items) {
  items.forEach(item => { if (item && item.p) loadImg(item.p); });
}

// ══════════════════════════════════════════════════════════
// TMDB NACHLADEN
// ══════════════════════════════════════════════════════════
let tmdbPageM=1, tmdbPageT=1;
function fetchTmdbBg(type) {
  const page = type==="movie" ? tmdbPageM++ : tmdbPageT++;
  const date = type==="movie" ? "primary_release_date.gte=2000-01-01" : "first_air_date.gte=2000-01-01";
  const url  = `${BASE}/discover/${type}?api_key=${API}&language=de-DE&sort_by=popularity.desc&vote_count.gte=200&without_genres=16&${date}&page=${page}`;
  fetch(url).then(r=>r.ok?r.json():null).then(d=>{
    if(!d?.results) return;
    const ex = new Set(TITLES.map(m=>m.id));
    const fresh = d.results.filter(m=>!ex.has(m.id)).map(m=>({
      id:m.id, t:m.title||m.name||"", tp:type,
      p:m.poster_path||"",
      r:parseFloat((m.vote_average||0).toFixed(1)),
      g:(m.genre_ids||[]).slice(0,4),
      y:(m.release_date||m.first_air_date||"").slice(0,4),
      pr:[],
    }));
    S.extraTitles.push(...fresh);
    fresh.slice(0,5).forEach(m=>fetchProviderBg(type,m.id));
    preloadImages(fresh.slice(0,5));
  }).catch(()=>{});
}

function fetchProviderBg(type, id) {
  fetch(`${BASE}/${type}/${id}/watch/providers?api_key=${API}`)
    .then(r=>r.ok?r.json():null)
    .then(d=>{
      if(!d)return;
      const p=(d.results?.DE?.flatrate||[]).slice(0,4).map(x=>({id:x.provider_id,n:PROV[x.provider_id]?.n||x.provider_name}));
      if(!p.length)return;
      S.queue=S.queue.map(m=>String(m.id)===String(id)?{...m,pr:p}:m);
      S.extraTitles=S.extraTitles.map(m=>String(m.id)===String(id)?{...m,pr:p}:m);
      // Provider-Badges auf aktueller Karte aktualisieren
      if(S.queue[0]&&String(S.queue[0].id)===String(id)){
        const prow=document.getElementById('card-providers');
        if(prow){prow.innerHTML=p.map(x=>`<span class="pbadge" style="background:${PROV[x.id]?.c||'#555'}">${x.n}</span>`).join('')}
      }
    }).catch(()=>{});
}

// ══════════════════════════════════════════════════════════
// SWIPE
// ══════════════════════════════════════════════════════════
function doSwipe(dir) {
  if(!S.queue.length||S.animating)return;
  const item=S.queue[0];
  const id=String(item.id);
  const isP1=S.player==="p1";
  S.animating=true;

  // Karte animieren
  const card=document.getElementById('main-card');
  if(card){
    const tx=dir==="right"?660:-660;
    const rot=dir==="right"?18:-18;
    card.classList.add('flying');
    card.style.transform=`translateX(${tx}px) rotate(${rot}deg)`;
    card.style.opacity='0';
  }

  let matched=null;
  if(dir==="right"){
    if(isP1){S.p1Liked.push(id);if(S.p2Liked.includes(id)){matched=item;S.matches.push(item);}}
    else     {S.p2Liked.push(id);if(S.p1Liked.includes(id)){matched=item;S.matches.push(item);}}
  }
  if(isP1)S.p1Seen.add(id);else S.p2Seen.add(id);
  save();

  setTimeout(()=>{
    S.animating=false;
    S.queue.shift();
    // Nächstes Bild sofort laden (Promise starten)
    if(S.queue[0]&&S.queue[0].p) loadImg(S.queue[0].p);
    // Weitere 7 Bilder im Hintergrund vorausladen
    preloadImages(S.queue.slice(1,8));
    if(S.queue.length<5){
      fetchTmdbBg(S.media==="tv"?"tv":"movie");
      if(S.media==="both")fetchTmdbBg("tv");
    }
    if(matched){S.newMatch=matched;renderSwipe();showMatch(matched);}
    else renderSwipe();
  },340);
}

// ══════════════════════════════════════════════════════════
// DRAG / TOUCH
// ══════════════════════════════════════════════════════════
function initDrag() {
  const card=document.getElementById('main-card');
  if(!card)return;
  let startX=0, startY=0, dragging=false;

  function start(e){
    if(S.animating)return;
    const t=e.touches?.[0]||e;
    startX=t.clientX; startY=t.clientY; dragging=true;
    S.drag={on:true,x:0};
    card.style.transition='none';
    card.classList.remove('snap-back');
  }
  function move(e){
    if(!dragging)return;
    const t=e.touches?.[0]||e;
    const dx=t.clientX-startX;
    const dy=t.clientY-startY;
    // Wenn hauptsächlich vertikales Scrollen: ignorieren
    if(!S.drag.on&&Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>10){dragging=false;return;}
    if(e.cancelable)e.preventDefault();
    S.drag={on:true,x:dx};
    card.style.transform=`translateX(${dx}px) rotate(${dx*0.045}deg)`;
    const lo=Math.min(1,Math.max(0,dx/55));
    const no=Math.min(1,Math.max(0,-dx/55));
    const ls=document.getElementById('like-stamp');
    const ns=document.getElementById('nope-stamp');
    if(ls)ls.style.opacity=lo;
    if(ns)ns.style.opacity=no;
  }
  function end(){
    if(!dragging)return;
    dragging=false;
    if(!S.drag.on)return;
    S.drag.on=false;
    if(S.drag.x>65)doSwipe('right');
    else if(S.drag.x<-65)doSwipe('left');
    else{
      card.classList.add('snap-back');
      card.style.transform='translateX(0) rotate(0)';
      const ls=document.getElementById('like-stamp');
      const ns=document.getElementById('nope-stamp');
      if(ls)ls.style.opacity=0;
      if(ns)ns.style.opacity=0;
    }
  }
  card.addEventListener('mousedown',start);
  document.addEventListener('mousemove',move);
  document.addEventListener('mouseup',end);
  card.addEventListener('touchstart',start,{passive:true});
  card.addEventListener('touchmove',move,{passive:false});
  card.addEventListener('touchend',end);
}

    <div style="width:34px;height:1px;background:#C9A84C;margin:0 auto 13px;opacity:.6"></div>
    <p style="color:#8A8780;font-size:13px;font-weight:300;margin-bottom:20px;line-height:1.6">Ihr mögt beide diesen Titel!</p>
    ${m.p||m.poster_path?`<img src="${IMG}${m.p||m.poster_path}" style="width:110px;height:165px;object-fit:cover;border-radius:13px;display:block;margin:0 auto 12px;border:1px solid rgba(201,168,76,.22);box-shadow:0 0 28px rgba(201,168,76,.18)" onerror="this.style.display='none'">`:''}
    <div class="serif" style="font-size:20px;font-weight:400;color:#F2EEE4;margin-bottom:9px">${esc(m.t||m.title||m.name||'')}</div>
    ${prow?`<div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:20px">${prow}</div>`:''}
    <button class="gold-btn press" style="max-width:200px;margin:0 auto;display:block" onclick="closeMatch()">Weiter swipen</button>
  </div>`;
  ov.classList.add('show');
}

// ══════════════════════════════════════════════════════════
// GLOBAL ACTIONS
// ══════════════════════════════════════════════════════════
function render(){
  switch(S.screen){
    case'loading':renderLoading();break;
    case'names':renderNames();break;
    case'select':renderSelect();break;
    case'swipe':renderSwipe();break;
    case'matches':renderMatches();break;
  }
}
function goTo(sc){S.screen=sc;render();}
function backFromMatches(){S.screen=S.queue.length?'swipe':'select';render();}
function setMedia(m){S.media=m;renderSelect();}
function saveNames(){
  const p1=document.getElementById('n1')?.value?.trim()||'Spieler 1';
  const p2=document.getElementById('n2')?.value?.trim()||'Spieler 2';
  S.names={p1,p2};S.nameEdit={p1,p2};save();S.screen='select';render();
}
function startPlayer(p){
  S.player=p;
  buildQueue();
  // Erstes Bild laden, dann Screen wechseln — kein Placeholder
  const first = S.queue[0];
  if(first && first.p){
    loadImg(first.p).then(()=>{
      S.screen='swipe';render();
    });
    // Gleichzeitig nächste Bilder starten
    preloadImages(S.queue.slice(1,10));
  } else {
    S.screen='swipe';render();
  }
  setTimeout(()=>{
    fetchTmdbBg(S.media==='tv'?'tv':'movie');
    if(S.media==='both')fetchTmdbBg('tv');
  },1500);
}
function resetRestart(){
  if(S.player==='p1')S.p1Seen=new Set();else S.p2Seen=new Set();
  buildQueue();renderSwipe();
}
function closeMatch(){
  S.newMatch=null;
  const ov=document.getElementById('match-overlay');
  if(ov){ov.classList.remove('show');ov.innerHTML='';}
}

// ══════════════════════════════════════════════════════════
// START
// ══════════════════════════════════════════════════════════
load();
render();
</script>
</body>
</html>
