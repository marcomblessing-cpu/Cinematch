<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0C0C0F">
<title>CinemaMatch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available;background:#0C0C0F;overflow:hidden}
body{height:100%;height:-webkit-fill-available;background:#0C0C0F;overflow:hidden;-webkit-font-smoothing:antialiased;font-family:'DM Sans',sans-serif;color:#F2EEE4;-webkit-text-size-adjust:100%}
button,input{font-family:inherit;-webkit-appearance:none;appearance:none}
input{-webkit-user-select:auto;user-select:auto;font-size:16px!important}/* 16px verhindert iOS-Zoom */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#2A2A32;border-radius:2px}

/* ── Layout ── */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;user-select:none;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes matchPop{0%{opacity:0;transform:scale(.5)}65%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.16)}}
.fade-up{animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both}
.fade-in{animation:fadeIn .25s ease both}
.serif{font-family:'Cormorant Garamond',serif}
.spinner{width:28px;height:28px;border:1.5px solid #2A2A32;border-top-color:#C9A84C;border-radius:50%;animation:spin .9s linear infinite;display:inline-block}

/* ── Interactivity ── */
.press{transition:transform .12s ease,opacity .12s ease;cursor:pointer;touch-action:manipulation}
.press:active{transform:scale(.9)!important;opacity:.65}
.pl{cursor:pointer;touch-action:manipulation}
.pl:active{opacity:.5}
input:focus{outline:2px solid rgba(201,168,76,.4);outline-offset:0}
input::placeholder{color:#4A4A50}

/* ── Screens ── */
.screen{width:100%;max-width:430px;padding:0 20px}

/* ── Card area ── */
#swipe-wrap{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;flex-shrink:0}
#card-stage{flex:1;position:relative;overflow:hidden;padding:4px 12px 0}

/* ── Cards ── */
.card{
  position:absolute;inset:10px;border-radius:22px;overflow:hidden;
  background:#18181D;touch-action:none;
  will-change:transform;-webkit-backface-visibility:hidden;backface-visibility:hidden;
}
.card-main{
  cursor:grab;
  box-shadow:0 16px 50px rgba(0,0,0,.65);
  transition:none;
}
.card-main.snap-back{transition:transform .22s ease}
.card-main.flying{transition:transform .34s cubic-bezier(.22,1,.36,1),opacity .34s ease}
.card-bg{transform:scale(.93) translateY(11px);opacity:.36;pointer-events:none}

/* ── Card image ── */
.card-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;display:block;
}
/* card-placeholder nicht mehr verwendet — Spinner stattdessen */
.card-gradient{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(to top,rgba(5,5,9,.97) 0%,rgba(5,5,9,.5) 42%,transparent 68%);
}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:14px 16px 18px;pointer-events:none}

/* ── Stamps ── */
.stamp{
  position:absolute;top:22px;border:2.5px solid;border-radius:9px;
  padding:5px 14px;font-size:18px;font-weight:700;
  opacity:0;transition:opacity .05s;letter-spacing:1.5px;pointer-events:none;
}
#like-stamp{left:18px;color:#4ADE80;border-color:#4ADE80;background:rgba(74,222,128,.14);transform:rotate(-13deg)}
#nope-stamp{right:18px;color:#F87171;border-color:#F87171;background:rgba(248,113,113,.14);transform:rotate(13deg)}

/* ── Badges ── */
.pbadge{font-size:10px;font-weight:600;color:#fff;border-radius:5px;padding:3px 8px;display:inline-block;line-height:1.4}
.gtag{font-size:11px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:2px 9px;display:inline-block;line-height:1.5}
.prow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.grow{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}

/* ── Bottom buttons ── */
#swipe-btns{display:flex;justify-content:center;align-items:center;gap:22px;padding:10px 20px;padding-bottom:calc(16px + env(safe-area-inset-bottom));flex-shrink:0}
.nope-btn{
  width:62px;height:62px;border-radius:50%;
  background:#C0392B;border:none;
  font-size:20px;font-weight:700;color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;touch-action:manipulation;
  box-shadow:0 4px 18px rgba(192,57,43,.35);
}
.like-btn{
  width:62px;height:62px;border-radius:50%;
  background:#27AE60;border:none;
  font-size:24px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;touch-action:manipulation;
  box-shadow:0 4px 18px rgba(39,174,96,.3);
}
.pause-btn{background:transparent;border:1px solid #2A2A32;border-radius:10px;padding:9px 16px;font-size:11px;font-weight:300;color:#4A4A50;cursor:pointer;touch-action:manipulation}

/* ── UI Buttons ── */
.gold-btn{background:linear-gradient(135deg,#C9A84C,#A88A38);color:#0C0C0F;border:none;border-radius:13px;padding:13px 20px;font-size:15px;font-weight:500;cursor:pointer;width:100%;touch-action:manipulation}
.topbar-btn{background:#111115;border:1px solid #2A2A32;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:300;color:#8A8780;cursor:pointer;touch-action:manipulation;white-space:nowrap}
.topbar-btn.gold{background:rgba(201,168,76,.10);border-color:rgba(201,168,76,.22);color:#C9A84C;font-weight:500}
.tab-btn{flex:1;background:transparent;border:1px solid transparent;border-radius:10px;padding:9px 0;font-size:12px;font-weight:400;color:#8A8780;cursor:pointer;transition:all .18s;touch-action:manipulation}
.tab-btn.active{background:#222228;border-color:#38383F;color:#F2EEE4;font-weight:600}
.player-btn{display:flex;align-items:center;gap:14px;background:#111115;border:1px solid #2A2A32;border-radius:16px;padding:14px 16px;cursor:pointer;text-align:left;width:100%;touch-action:manipulation}
.match-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(201,168,76,.10);border:1px solid rgba(201,168,76,.22);border-radius:20px;padding:7px 13px;font-size:12px;font-weight:500;color:#C9A84C;cursor:pointer;white-space:nowrap;touch-action:manipulation}
.small-btn{background:linear-gradient(135deg,#C9A84C,#A88A38);color:#0C0C0F;border:none;border-radius:10px;padding:9px 22px;font-size:13px;font-weight:500;cursor:pointer;touch-action:manipulation}

/* ── Match overlay ── */
#match-overlay{position:fixed;inset:0;background:rgba(10,10,13,.94);-webkit-backdrop-filter:blur(22px);backdrop-filter:blur(22px);display:none;align-items:center;justify-content:center;z-index:1000;padding:28px;padding-bottom:calc(28px + env(safe-area-inset-bottom))}
#match-overlay.show{display:flex;animation:fadeIn .3s ease both}

/* ── Matches list ── */
.matches-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.match-card{background:#111115;border-radius:14px;overflow:hidden;border:1px solid #2A2A32}
.match-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}

/* ── Misc ── */
.card-box{background:#111115;border:1px solid #2A2A32;border-radius:16px;padding:22px;margin-bottom:14px}
.label-sm{font-size:10px;letter-spacing:1.5px;color:#4A4A50;text-transform:uppercase;font-weight:500;margin-bottom:7px}
.inp{width:100%;background:#222228;border:1px solid #1E1E24;border-radius:10px;padding:12px 14px;color:#F2EEE4;font-size:16px;font-weight:300}
</style>
</head>

// STATE & STORAGE
// ══════════════════════════════════════════════════════════
const S = {
  screen:"loading", names:{p1:"Spieler 1",p2:"Spieler 2"},
  nameEdit:{p1:"",p2:""}, player:"p1", queue:[],
  p1Liked:[], p2Liked:[], p1Seen:new Set(), p2Seen:new Set(),
  matches:[], newMatch:null, media:"movie",
  drag:{on:false,x:0}, animating:false, extraTitles:[],
};

function save() {
  try {
    localStorage.setItem("cm_names",   JSON.stringify(S.names));
    localStorage.setItem("cm_media",   S.media);
    localStorage.setItem("cm_p1l",     JSON.stringify(S.p1Liked));
    localStorage.setItem("cm_p2l",     JSON.stringify(S.p2Liked));
    localStorage.setItem("cm_p1s",     JSON.stringify([...S.p1Seen]));
    localStorage.setItem("cm_p2s",     JSON.stringify([...S.p2Seen]));
    localStorage.setItem("cm_matches", JSON.stringify(S.matches));
  } catch(e) {}
}

function load() {
  try {
    const ns    = localStorage.getItem("cm_names");
    const media = localStorage.getItem("cm_media");
    const p1l   = localStorage.getItem("cm_p1l");
    const p2l   = localStorage.getItem("cm_p2l");
    const p1s   = localStorage.getItem("cm_p1s");
    const p2s   = localStorage.getItem("cm_p2s");
    const ms    = localStorage.getItem("cm_matches");
    if (ns)    { const n=JSON.parse(ns); S.names=n; S.nameEdit={...n}; }
    if (media) S.media   = media;
    if (p1l)   S.p1Liked = JSON.parse(p1l);
    if (p2l)   S.p2Liked = JSON.parse(p2l);
    if (p1s)   S.p1Seen  = new Set(JSON.parse(p1s));
    if (p2s)   S.p2Seen  = new Set(JSON.parse(p2s));
    if (ms)    S.matches  = JSON.parse(ms);
    S.screen = ns ? "select" : "names";
  } catch(e) { S.screen = "names"; }
}

// QUEUE
// ══════════════════════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildQueue() {
  const seen = S.player==="p1" ? S.p1Seen : S.p2Seen;
  const all  = [...TITLES, ...S.extraTitles];
  let pool;
  if (S.media==="both") {
    const mv = shuffle(all.filter(m=>m.tp==="movie"&&!seen.has(String(m.id))));
    const tv = shuffle(all.filter(m=>m.tp==="tv"&&!seen.has(String(m.id))));
    pool=[];
    for(let i=0;i<Math.max(mv.length,tv.length);i++){
      if(mv[i])pool.push(mv[i]);
      if(tv[i])pool.push(tv[i]);
    }
  } else {
    pool = shuffle(all.filter(m=>m.tp===S.media&&!seen.has(String(m.id))));
  }
  if (!pool.length) {
    if(S.player==="p1")S.p1Seen=new Set();else S.p2Seen=new Set();
    return buildQueue();
  }
  S.queue = pool;
  preloadImages(pool.slice(0,10));
}

// ══════════════════════════════════════════════════════════════════════
// POSTER-SYSTEM
//
// Kernprinzip: prefetchPosters() holt ALLE Poster-Pfade für die Queue
// BEVOR die erste Karte gezeigt wird. Danach sind alle Pfade in
// correctPaths — kein Async-Race während des Spielens möglich.
//
// fetchVerifiedPath: 3 Versuche, kein item.p-Fallback für Anzeige.
//   Falsches Poster ist schlimmer als ein kurzer Ladescreen.
// ══════════════════════════════════════════════════════════════════════

const correctPaths = new Map(); // "${tp}:${id}" → verifizierter poster_path
const pathFetches  = new Map(); // "${tp}:${id}" → laufendes Promise
const imgCache     = new Map(); // url           → Promise<HTMLImageElement>

// TMDB-API-Call, bis zu 3 Versuche, speichert NUR bestätigte Pfade
function fetchVerifiedPath(item) {
  if (!item?.id || !item?.tp) return Promise.resolve(null);
  const key = `${item.tp}:${item.id}`;
  if (correctPaths.has(key)) return Promise.resolve(correctPaths.get(key));
  if (pathFetches.has(key))  return pathFetches.get(key);

  function attempt(n) {
    return fetch(`${BASE}/${item.tp}/${item.id}?api_key=${API}`)
      .then(r => r.ok ? r.json() : null)
      .then(d => d?.poster_path || null)
      .catch(() => null)
      .then(path => {
        if (path) { correctPaths.set(key, path); return path; }
        if (n > 0) return new Promise(r => setTimeout(r, 1500)).then(() => attempt(n - 1));
        return null;
      });
  }

  const p = attempt(2);
  pathFetches.set(key, p);
  return p;
}

// Bild laden — probiert w342 → w500 → w780 → original
function loadImgPath(posterPath) {
  if (!posterPath) return Promise.resolve(null);
  const sizes = ['w342','w500','w780','original'];
  function trySize(i) {
    if (i >= sizes.length) return Promise.resolve(null);
    const url = `https://image.tmdb.org/t/p/${sizes[i]}${posterPath}`;
    if (imgCache.has(url)) return imgCache.get(url);
    const p = new Promise(resolve => {
      const img = new Image();
      img.onload  = () => { imgCache.set(url, Promise.resolve(img)); resolve(img); };
      img.onerror = () => resolve(trySize(i + 1));
      img.src = url;
      if (img.complete && img.naturalWidth > 0) { imgCache.set(url, Promise.resolve(img)); resolve(img); }
    });
    return p;
  }
  return trySize(0);
}

// Verifizierter Pfad + Bild laden
function loadPoster(item) {
  if (!item) return Promise.resolve(null);
  const key = `${item.tp}:${item.id}`;
  const known = correctPaths.get(key);
  if (known) return loadImgPath(known);
  return fetchVerifiedPath(item).then(path => loadImgPath(path));
}

// Hintergrund-Vorwärmen für nächste Karten
function warmPoster(item) {
  if (!item) return;
  fetchVerifiedPath(item).then(path => { if (path) loadImgPath(path); });
}
function preloadImages(items) { items.forEach(item => { if (item) warmPoster(item); }); }

// Batch-Prefetch: holt Pfade für die ersten 30 Queue-Items VOR dem ersten Swipe
// Batches von 8 um TMDB Rate-Limit (40 req/10s) zu respektieren
function prefetchPosters(queue) {
  const items = queue.slice(0, 30).filter(it => !correctPaths.has(`${it.tp}:${it.id}`));
  const batches = [];
  for (let i = 0; i < items.length; i += 8) batches.push(items.slice(i, i + 8));
  return batches.reduce(
    (chain, batch) => chain.then(() => Promise.all(batch.map(it => fetchVerifiedPath(it)))),
    Promise.resolve()
  );
}

function loadImg(path) { return loadImgPath(path); } // legacy

// ══════════════════════════════════════════════════════════
// TMDB NACHLADEN
// ══════════════════════════════════════════════════════════
let tmdbPageM=1, tmdbPageT=1;
function fetchTmdbBg(type) {
  const page = type==="movie" ? tmdbPageM++ : tmdbPageT++;
  const date = type==="movie" ? "primary_release_date.gte=2000-01-01" : "first_air_date.gte=2000-01-01";
  const url  = `${BASE}/discover/${type}?api_key=${API}&language=de-DE&sort_by=popularity.desc&vote_count.gte=200&without_genres=16&${date}&page=${page}`;
  fetch(url).then(r=>r.ok?r.json():null).then(d=>{
    if(!d?.results) return;
    const ex = new Set(TITLES.map(m=>m.id));
    const fresh = d.results.filter(m=>!ex.has(m.id)).map(m=>({
      id:m.id, t:m.title||m.name||"", tp:type,
      p:m.poster_path||"",
      r:parseFloat((m.vote_average||0).toFixed(1)),
      g:(m.genre_ids||[]).slice(0,4),
      y:(m.release_date||m.first_air_date||"").slice(0,4),
      pr:[],
    }));
    S.extraTitles.push(...fresh);
    fresh.slice(0,5).forEach(m=>fetchProviderBg(type,m.id));
    preloadImages(fresh.slice(0,5));
  }).catch(()=>{});
}

function fetchProviderBg(type, id) {
  fetch(`${BASE}/${type}/${id}/watch/providers?api_key=${API}`)
    .then(r=>r.ok?r.json():null)
    .then(d=>{
      if(!d)return;
      const p=(d.results?.DE?.flatrate||[]).slice(0,4).map(x=>({id:x.provider_id,n:PROV[x.provider_id]?.n||x.provider_name}));
      if(!p.length)return;
      S.queue=S.queue.map(m=>String(m.id)===String(id)?{...m,pr:p}:m);
      S.extraTitles=S.extraTitles.map(m=>String(m.id)===String(id)?{...m,pr:p}:m);
      // Provider-Badges auf aktueller Karte aktualisieren
      if(S.queue[0]&&String(S.queue[0].id)===String(id)){
        const prow=document.getElementById('card-providers');
        if(prow){prow.innerHTML=p.map(x=>`<span class="pbadge" style="background:${PROV[x.id]?.c||'#555'}">${x.n}</span>`).join('')}
      }
    }).catch(()=>{});
}

// ══════════════════════════════════════════════════════════
// SWIPE
// ══════════════════════════════════════════════════════════
function doSwipe(dir) {
  if(!S.queue.length||S.animating)return;
  const item=S.queue[0];
  const id=String(item.id);
  const isP1=S.player==="p1";
  S.animating=true;

  // Karte animieren
  const card=document.getElementById('main-card');
  if(card){
    const tx=dir==="right"?660:-660;
    const rot=dir==="right"?18:-18;
    card.classList.add('flying');
    card.style.transform=`translateX(${tx}px) rotate(${rot}deg)`;
    card.style.opacity='0';
  }

  let matched=null;
  if(dir==="right"){
    if(isP1){S.p1Liked.push(id);if(S.p2Liked.includes(id)){matched=item;S.matches.push(item);}}
    else     {S.p2Liked.push(id);if(S.p1Liked.includes(id)){matched=item;S.matches.push(item);}}
  }
  if(isP1)S.p1Seen.add(id);else S.p2Seen.add(id);
  save();

  setTimeout(()=>{
    S.animating=false;
    S.queue.shift();
    // Nächstes Bild sofort laden (verifizierter Pfad)
    if(S.queue[0]) warmPoster(S.queue[0]);
    // Weitere 7 Bilder im Hintergrund vorausladen
    preloadImages(S.queue.slice(1,8));
    if(S.queue.length<5){
      fetchTmdbBg(S.media==="tv"?"tv":"movie");
      if(S.media==="both")fetchTmdbBg("tv");
    }
    if(matched){S.newMatch=matched;renderSwipe();showMatch(matched);}
    else renderSwipe();
  },340);
}

// ══════════════════════════════════════════════════════════
// DRAG / TOUCH
// ══════════════════════════════════════════════════════════
function initDrag() {
  const card=document.getElementById('main-card');
  if(!card)return;
  let startX=0, startY=0, dragging=false;

  function start(e){
    if(S.animating)return;
    const t=e.touches?.[0]||e;
    startX=t.clientX; startY=t.clientY; dragging=true;
    S.drag={on:true,x:0};
    card.style.transition='none';
    card.classList.remove('snap-back');
  }
  function move(e){
    if(!dragging)return;
    const t=e.touches?.[0]||e;
    const dx=t.clientX-startX;
    const dy=t.clientY-startY;
    // Wenn hauptsächlich vertikales Scrollen: ignorieren
    if(!S.drag.on&&Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>10){dragging=false;return;}
    if(e.cancelable)e.preventDefault();
    S.drag={on:true,x:dx};
    card.style.transform=`translateX(${dx}px) rotate(${dx*0.045}deg)`;
    const lo=Math.min(1,Math.max(0,dx/55));
    const no=Math.min(1,Math.max(0,-dx/55));
    const ls=document.getElementById('like-stamp');
    const ns=document.getElementById('nope-stamp');
    if(ls)ls.style.opacity=lo;
    if(ns)ns.style.opacity=no;
  }
  function end(){
    if(!dragging)return;
    dragging=false;
    if(!S.drag.on)return;
    S.drag.on=false;
    if(S.drag.x>65)doSwipe('right');
    else if(S.drag.x<-65)doSwipe('left');
    else{
      card.classList.add('snap-back');
      card.style.transform='translateX(0) rotate(0)';
      const ls=document.getElementById('like-stamp');
      const ns=document.getElementById('nope-stamp');
      if(ls)ls.style.opacity=0;
      if(ns)ns.style.opacity=0;
    }
  }
  card.addEventListener('mousedown',start);
  document.addEventListener('mousemove',move);
  document.addEventListener('mouseup',end);
  card.addEventListener('touchstart',start,{passive:true});
  card.addEventListener('touchmove',move,{passive:false});
  card.addEventListener('touchend',end);
}

function buildCardEl(card){
  const slot=document.getElementById('card-slot');
  if(!slot)return;
  slot.innerHTML='';

  if(!card){
    slot.innerHTML=`<div style="position:absolute;inset:10px;display:flex;align-items:center;justify-content:center">
      <div style="text-align:center;background:#111115;border:1px solid #2A2A32;border-radius:20px;padding:28px 24px">

        <button class="small-btn press" onclick="resetRestart()">Von vorne starten</button>
      </div>
    </div>`;
    return;
  }

  // Lade-Spinner (max. 8s Timeout)
  const spinner = document.createElement('div');
  spinner.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#0f0f14;border-radius:22px;z-index:2';
  spinner.innerHTML='<div class="spinner"></div><div style="font-size:11px;color:#4A4A50;font-weight:300">Lade Poster…</div>';
  slot.appendChild(spinner);

  // Nächste Bilder sofort vorausladen
  preloadImages(S.queue.slice(1,8));

  // Nach 3s Hinweis updaten falls noch lädt
  const slowTimer = setTimeout(()=>{
    const label = spinner.querySelector('div:last-child');
    if(label) label.textContent = 'Langsames Internet…';
  }, 3000);

  // Warten bis Bild fertig geladen — dann Karte einblenden
  loadPoster(card).then(imgEl => {
    clearTimeout(slowTimer);
    // Slot noch gültig? Prüfe isConnected, nicht getElementById —
    // getElementById findet sonst den Slot eines neuen Renders, was
    // dazu führt dass das Poster kurz aufblitzt und dann verschwindet.
    if(!slot.isConnected) return;

    // Spinner entfernen
    spinner.remove();

    const el=document.createElement('div');
    el.id='main-card';
    el.className='card card-main card-in';

    // Bild einbauen — es ist bereits geladen, erscheint sofort
    if(imgEl){
      const img=document.createElement('img');
      img.className='card-img loaded';  // sofort sichtbar, kein Fade
      img.draggable=false;
      img.src=imgEl.src;
      el.appendChild(img);
    } else {
      // Bild nicht verfügbar — eleganter Hintergrund-Gradient
      // Farbe aus Titel-Hash damit jede Karte anders aussieht
      const hash = card.t.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
      const hue  = hash % 360;
      const bg   = document.createElement('div');
      bg.style.cssText = `position:absolute;inset:0;background:linear-gradient(160deg,hsl(${hue},30%,14%),hsl(${hue},20%,8%))`;
      el.appendChild(bg);
      // Titel groß in der Mitte
      const label = document.createElement('div');
      label.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center';
      label.innerHTML = `<div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:rgba(255,255,255,.5);line-height:1.3">${esc(card.t)}</div>`;
      el.appendChild(label);
    }

    // Gradient
    const grad=document.createElement('div');
    grad.className='card-gradient';
    el.appendChild(grad);

    // Stamps
    el.insertAdjacentHTML('beforeend',`
      <div id="like-stamp" class="stamp">LIKE ✓</div>
      <div id="nope-stamp" class="stamp">NOPE ✗</div>
    `);

    // Info
    const yr=card.y||'';
    el.insertAdjacentHTML('beforeend',`
      <div class="card-info">
        ${provHTML(card.pr)}
        <div class="serif" style="font-size:26px;font-weight:400;line-height:1.2;color:#F9F5EC;margin-bottom:6px;text-shadow:0 1px 8px rgba(0,0,0,.7)">${esc(card.t)}</div>
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:2px">
          <span style="font-size:13px;font-weight:600;color:#C9A84C">★ ${card.r?card.r.toFixed(1):'–'}</span>
          <span style="color:rgba(255,255,255,.2)">·</span>
          <span style="font-size:12px;color:rgba(255,255,255,.5);font-weight:300">${yr}</span>
          <span style="font-size:10px;color:rgba(255,255,255,.35);background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:2px 7px">${card.tp==='movie'?'FILM':'SERIE'}</span>
        </div>
        ${genHTML(card.g)}
      </div>
    `);

    slot.appendChild(el);
    initDrag();
  });
}

function renderMatches(){
  const cards=S.matches.length===0
    ?`<div style="text-align:center;padding:70px 0;color:#8A8780">
        <div style="font-size:40px;margin-bottom:12px;color:#4A4A50">✦</div>
        <div class="serif" style="font-size:20px;color:#F2EEE4;margin-bottom:5px">Noch keine Matches</div>
        <div style="font-size:13px;font-weight:300">Fangt an zu swipen!</div>
      </div>`
    :`<div class="matches-grid">${S.matches.map(m=>{
        const prow=(m.providers||m.pr||[]).slice(0,2).map(p=>`<span class="pbadge" style="background:${PROV[p.id||p.provider_id]?.c||'#555'}">${esc(p.n||p.provider_name||'')}</span>`).join('');
        const tp=(m._type||m.tp)==='movie'?'Film':'Serie';
        const r=(m.vote_average||m.r||0).toFixed(1);
        return`<div class="match-card fade-in">
          ${(m.poster_path||m.p)?`<img src="${IMG}${m.poster_path||m.p}" loading="lazy" onerror="this.style.display='none'">`:`<div style="aspect-ratio:2/3;background:#222228;display:flex;align-items:center;justify-content:center;font-size:32px">🎬</div>`}
          <div style="padding:9px 10px 11px">
            <div style="font-size:12px;font-weight:600;line-height:1.35;margin-bottom:3px;color:#F2EEE4">${esc(m.title||m.name||m.t||'')}</div>
            <div style="font-size:10px;color:#4A4A50;font-weight:300;margin-bottom:${prow?'5':'0'}px">★ ${r} · ${tp}</div>
            ${prow?`<div style="display:flex;gap:4px;flex-wrap:wrap">${prow}</div>`:''}
          </div>
        </div>`;
      }).join('')}</div>`;

  setHTML(`<div style="width:100%;max-width:420px;height:100%;display:flex;flex-direction:column">
    <div style="padding:16px 18px 13px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:1px solid #1E1E24;background:#0C0C0F">
      <button class="pl" style="background:transparent;border:none;font-size:18px;cursor:pointer;color:#8A8780;padding:4px;line-height:1;flex-shrink:0" onclick="backFromMatches()">←</button>
      <div>
        <h2 class="serif" style="font-size:22px;font-weight:400;color:#F2EEE4">Eure Matches</h2>
        <div style="font-size:11px;color:#4A4A50;font-weight:300">${S.matches.length} gemeinsame ${S.matches.length===1?'Auswahl':'Auswahlen'}</div>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:13px 13px 22px">${cards}</div>
  </div>`);
}

function showMatch(m){
  const ov=document.getElementById('match-overlay');
  const prow=(m.pr||m.providers||[]).map(p=>`<span class="pbadge" style="background:${PROV[p.id||p.provider_id]?.c||'#555'}">${esc(p.n||p.provider_name||'')}</span>`).join('');
  ov.innerHTML=`<div class="match-pop" style="text-align:center;max-width:300px">
    <div style="font-size:50px;margin-bottom:3px;animation:pulse 1.1s ease infinite;display:inline-block">❤️</div>
    <h2 class="serif" style="font-size:36px;font-weight:400;color:#F2EEE4;line-height:1.1;margin-bottom:5px">It's a Match</h2>
    <div style="width:34px;height:1px;background:#C9A84C;margin:0 auto 13px;opacity:.6"></div>
    <p style="color:#8A8780;font-size:13px;font-weight:300;margin-bottom:20px;line-height:1.6">Ihr mögt beide diesen Titel!</p>
    ${m.p||m.poster_path?`<img src="${IMG}${m.p||m.poster_path}" style="width:110px;height:165px;object-fit:cover;border-radius:13px;display:block;margin:0 auto 12px;border:1px solid rgba(201,168,76,.22);box-shadow:0 0 28px rgba(201,168,76,.18)" onerror="this.style.display='none'">`:''}
    <div class="serif" style="font-size:20px;font-weight:400;color:#F2EEE4;margin-bottom:9px">${esc(m.t||m.title||m.name||'')}</div>
    ${prow?`<div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:20px">${prow}</div>`:''}
    <button class="gold-btn press" style="max-width:200px;margin:0 auto;display:block" onclick="closeMatch()">Weiter swipen</button>
  </div>`;
  ov.classList.add('show');
}

// ══════════════════════════════════════════════════════════
// GLOBAL ACTIONS
// ══════════════════════════════════════════════════════════
function render(){
  switch(S.screen){
    case'loading':renderLoading();break;
    case'names':renderNames();break;
    case'select':renderSelect();break;
    case'swipe':renderSwipe();break;
    case'matches':renderMatches();break;
  }
}
function goTo(sc){S.screen=sc;render();}
function backFromMatches(){S.screen=S.queue.length?'swipe':'select';render();}
function setMedia(m){S.media=m;renderSelect();}
function saveNames(){
  const p1=document.getElementById('n1')?.value?.trim()||'Spieler 1';
  const p2=document.getElementById('n2')?.value?.trim()||'Spieler 2';
  S.names={p1,p2};S.nameEdit={p1,p2};save();S.screen='select';render();
}
function startPlayer(p){
  S.player=p;
  buildQueue();
  if(!S.queue.length){ S.screen='swipe'; render(); return; }

  // Lade-Screen zeigen während Poster-Pfade verifiziert werden
  setHTML(`<div class="fade-in" style="display:flex;flex-direction:column;align-items:center;gap:18px">
    ${logoHTML(false)}
    <div class="spinner"></div>
    <div style="font-size:12px;color:#4A4A50;font-weight:300">Poster werden geladen…</div>
  </div>`);

  // 1. Pfade für erste 30 Items per TMDB verifizieren
  // 2. Erst danach Swipe-Screen zeigen → garantiert korrekte Poster
  prefetchPosters(S.queue).then(() => {
    // Erstes Bild wirklich laden, dann anzeigen
    return loadPoster(S.queue[0]);
  }).then(() => {
    S.screen='swipe'; render();
    // Restliche Bilder im Hintergrund vorbereiten
    preloadImages(S.queue.slice(1, 15));
    setTimeout(()=>{
      fetchTmdbBg(S.media==='tv'?'tv':'movie');
      if(S.media==='both')fetchTmdbBg('tv');
    }, 2000);
  });
}
function resetRestart(){
  if(S.player==='p1')S.p1Seen=new Set();else S.p2Seen=new Set();
  buildQueue();renderSwipe();
}
function closeMatch(){
  S.newMatch=null;
  const ov=document.getElementById('match-overlay');
  if(ov){ov.classList.remove('show');ov.innerHTML='';}
}

// ══════════════════════════════════════════════════════════
// START
// ══════════════════════════════════════════════════════════
load();
render();
</script>
